<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <form id="formulario">
        <label for="nombre">nombre:</label>
        <input type="text" id="nombre" class="nombre" name="nombre" required>

        <label for="email">email:</label>
        <input type="email" id="email" name="email" required>

        <label for="asunto">asunto:</label>
        <input type="text" id="asunto" name="asunto" required>

        <label for="mensaje">mensaje:</label>
        <textarea id="mensaje" class="mensaje" name="mensaje" required></textarea>

        <button type="submit">enviar</button>
    </form>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // Inicializar EmailJS con tu Public Key
        emailjs.init("pbh2jauroFz5qU3L0");

        document.getElementById("formulario").addEventListener("submit", function(e) {
            e.preventDefault();

            const parametros = {
                nombre: document.getElementById("nombre").value,
                email: document.getElementById("email").value,
                asunto: document.getElementById("asunto").value,
                mensaje: document.getElementById("mensaje").value
            };

            emailjs.send("service_bwar1zo", "template_ep0dl1b", parametros)
                .then(function() {
                    alert("¡Correo enviado correctamente!");
                    document.getElementById("formulario").reset();
                })
                .catch(function(error) {
                    console.error("Error EmailJS:", error);
                    alert("Error al enviar el correo. Revisa la consola para más detalles.");
                });
        });
    </script>

</body>
</html>
